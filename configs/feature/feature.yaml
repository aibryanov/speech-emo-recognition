extractors:
  - name: "log_mel"
    params:
      n_fft: 2048
      hop_length: 512
      n_mels: 80
      window: "hann"

  - name: "mfcc_delta"
    params:
      n_fft: 2048
      hop_length: 512
      n_mels: 80
      n_mfcc: 40
      window: "hann"

  - name: "mfcc_delta2"
    params:
      n_fft: 2048
      hop_length: 512
      n_mels: 80
      n_mfcc: 40
      window: "hann"

  - name: "rms_energy"
    params:
      n_fft: 2048
      hop_length: 512
      window: "hann"

regularization:
  enabled: true
  feature_noise_std: 0.005
  feature_dropout: 0.08
  time_mask_param: 8
  freq_mask_param: 6
  num_time_masks: 2
  num_freq_masks: 1
