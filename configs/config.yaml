defaults:
  - dataset: "audio_mnist"
  - feature: "feature"
  - _self_

experiment_name: "audio_mnist_baseline"


dataloader:
  batch_size: 32
  num_workers: 0
  shuffle: true
  dev_size: 0.1
  test_size: 0.2

train:
  seed: 42
  epochs: 10
  learning_rate: 0.001
  device: gpu
  weight_decay: 0.01
  log_every: 200
  metrics_average: "macro"

model:
  pooling: "mean"
  head_dropout: 0.2
  num_classes: 10
  lstm:
    hidden_size: 128
    num_layers: 1
    dropout: 0.2
    bidirectional: false

seed: 42
