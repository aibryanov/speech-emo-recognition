defaults:
  - dataset: "audio_mnist"
  - feature: "feature"
  - _self_
  - optional experiment: null

experiment_name: "audio_mnist_baseline"


dataloader:
  batch_size: 32
  num_workers: 0
  shuffle: true
  dev_size: 0.1
  test_size: 0.2

train:
  seed: 42
  epochs: 20
  learning_rate: 0.001
  device: cpu
  weight_decay: 0.01
  log_every: 300
  metrics_average: "macro"
  label_smoothing: 0.1
  grad_clip_norm: 1.0
  early_stopping:
    enabled: true
    monitor: "f1"
    mode: "max"
    patience: 5
    min_delta: 0.0
  checkpoint:
    enabled: true
    dir: "checkpoints"
    top_k: 2
    monitor: "f1"
    mode: "max"

model:
  pooling: "mean"
  feature_dropout: 0.15
  head_dropout: 0.35
  num_classes: 10
  lstm:
    hidden_size: 128
    num_layers: 1
    dropout: 0.2
    bidirectional: false

wandb:
  enabled: false
  project: "speech-emo-recognition"
  entity: null
  run_name: null
  mode: "online"
  group: null
  job_type: "train"
  tags: []
  notes: null
  save_code: false
  watch_model: false
  watch_log: "gradients"
  watch_log_freq: 100

evaluation:
  print_per_class_metrics: true
  print_confusion_matrix: true

seed: 42
